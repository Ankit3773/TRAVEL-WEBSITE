spring.datasource.url=jdbc:h2:file:./.data/narayan_travels;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/local-h2-repair.sql

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.admin.email=${APP_ADMIN_EMAIL:admin@narayantravels.in}
app.admin.password=${APP_ADMIN_PASSWORD:Admin123!}
app.frontend.allowed-origins=${APP_FRONTEND_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080}
app.frontend.show-local-admin-hint=${APP_FRONTEND_SHOW_LOCAL_ADMIN_HINT:true}
app.customer.bootstrap.enabled=${APP_CUSTOMER_BOOTSTRAP_ENABLED:true}
app.customer.name=${APP_CUSTOMER_NAME:Ankit Kumar}
app.customer.email=${APP_CUSTOMER_EMAIL:ankit@narayantravels.local}
app.customer.password=${APP_CUSTOMER_PASSWORD:Customer123!}
