spring.application.name=narayan-travels-backend

# Supabase PostgreSQL connection (set via environment variables)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/narayan_travels}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:2}
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preferQueryMode=simple

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET:dev-secret-key-change-this-to-a-long-random-value}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.admin.email=${APP_ADMIN_EMAIL:}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.seed.fleet.enabled=${APP_SEED_FLEET_ENABLED:true}
app.seed.fleet.prune-legacy=${APP_SEED_PRUNE_LEGACY:true}
app.booking.lock-minutes=${APP_BOOKING_LOCK_MINUTES:5}
app.booking.lock-cleanup-ms=${APP_BOOKING_LOCK_CLEANUP_MS:60000}
app.booking.lock-cleanup-initial-delay-ms=${APP_BOOKING_LOCK_CLEANUP_INITIAL_DELAY_MS:30000}
app.payment.gateway=${APP_PAYMENT_GATEWAY:MOCK}
app.frontend.allowed-origins=${APP_FRONTEND_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080}

# Observability
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
management.info.java.enabled=true

info.app.name=${spring.application.name}
info.app.description=Narayan Travels backend APIs
info.app.stage=9
info.app.frontend=static-html-css-js

# Include correlation id from MDC in log level segment
logging.pattern.level=%5p [requestId:%X{requestId:-}]
