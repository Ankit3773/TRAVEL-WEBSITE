# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name naryantravel.duckdns.org;
    return 301 https://$host$request_uri;
}

# HTTPS reverse proxy to Spring Boot on :8080
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name naryantravel.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/naryantravel.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naryantravel.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
    }
}
